": "ch25_第二十五章_DGX Spark RAPIDS 資料科學加速/png/p013.png", "label": "p013"}]}];
let curGroup = 0, curSlide = 0;
let scale = 1, tx = 0, ty = 0;
const img = document.getElementById('img');
const viewer = document.getElementById('viewer');
const badge = document.getElementById('badge');
const counter = document.getElementById('counter');
const crumb = document.getElementById('crumb');
const sidebar = document.getElementById('sidebar');
const thumbs = document.getElementById('thumbs');
const btnPrev = document.getElementById('btn-prev');
const btnNext = document.getElementById('btn-next');

function buildSidebar() {
  sidebar.innerHTML = '';
  GROUPS.forEach(function(g, gi) {
    const b = document.createElement('button');
    b.innerHTML = '<span>' + g.label + '</span><span class="gbadge">' + g.images.length + '</span>';
    b.onclick = function(){ switchGroup(gi); };
    b.dataset.gi = gi;
    sidebar.appendChild(b);
  });
}
function buildThumbs() {
  thumbs.innerHTML = '';
  GROUPS[curGroup].images.forEach(function(im, si) {
    const t = document.createElement('img');
    t.src = im.file;
    t.onclick = function(){ loadSlide(curGroup, si); };
    t.dataset.si = si;
    thumbs.appendChild(t);
  });
}
function fitImage() {
  const PAD = 24;
  scale = Math.min((viewer.clientWidth - PAD*2) / img.naturalWidth,
                   (viewer.clientHeight - PAD*2) / img.naturalHeight);
  if (!isFinite(scale) || scale <= 0) scale = 1;
  tx = (viewer.clientWidth  - img.naturalWidth  * scale) / 2;
  ty = (viewer.clientHeight - img.naturalHeight * scale) / 2;
  applyTransform();
}
function applyTransform() {
  img.style.transform = 'matrix(' + scale + ',0,0,' + scale + ',' + tx + ',' + ty + ')';
  badge.textContent = Math.round(scale * 100) + '%';
}
function loadSlide(gi, si) {
  curGroup = gi; curSlide = si;
  const g = GROUPS[gi];
  img.onload = fitImage;
  img.src = g.images[si].file;
  counter.textContent = (si+1) + ' / ' + g.images.length;
  crumb.textContent = g.label + '  ›  ' + (si+1);
  Array.prototype.forEach.call(sidebar.children, function(b){ b.classList.toggle('active', +b.dataset.gi === gi); });
  Array.prototype.forEach.call(thumbs.children, function(t){ t.classList.toggle('active', +t.dataset.si === si); });
  const at = thumbs.querySelector('img.active'); if (at) at.scrollIntoView({block:'nearest', inline:'center'});
  const ab = sidebar.querySelector('button.active'); if (ab) ab.scrollIntoView({block:'nearest'});
  btnPrev.disabled = (gi === 0 && si === 0);
  btnNext.disabled = (gi === GROUPS.length-1 && si === g.images.length-1);
}
function buildThumbsFor(gi) { curGroup = gi; buildThumbs(); }
function switchGroup(gi) { buildThumbsFor(gi); loadSlide(gi, 0); }
function gotoPrev() {
  if (curSlide > 0) loadSlide(curGroup, curSlide-1);
  else if (curGroup > 0) { buildThumbsFor(curGroup-1); loadSlide(curGroup-1, GROUPS[curGroup-1].images.length-1); }
}
function gotoNext() {
  const g = GROUPS[curGroup];
  if (curSlide < g.images.length-1) loadSlide(curGroup, curSlide+1);
  else if (curGroup < GROUPS.length-1) { buildThumbsFor(curGroup+1); loadSlide(curGroup+1, 0); }
}
btnPrev.onclick = gotoPrev;
btnNext.onclick = gotoNext;
document.addEventListener('keydown', function(e) {
  if (e.key === 'ArrowLeft') gotoPrev();
  else if (e.key === 'ArrowRight') gotoNext();
  else if (e.key === ' ') { e.preventDefault(); btnPlay.click(); }
});
viewer.addEventListener('wheel', function(e) {
  e.preventDefault();
  const factor = e.deltaY < 0 ? 1.13 : 1/1.13;
  const newScale = Math.min(Math.max(scale*factor, 0.1), 25);
  const vr = viewer.getBoundingClientRect();
  const cx = e.clientX - vr.left, cy = e.clientY - vr.top;
  tx = cx - (cx - tx) * (newScale/scale);
  ty = cy - (cy - ty) * (newScale/scale);
  scale = newScale; applyTransform();
}, { passive:false });
let dragging=false, sx=0, sy=0;
viewer.addEventListener('mousedown', function(e){ dragging=true; sx=e.clientX-tx; sy=e.clientY-ty; viewer.classList.add('grabbing'); });
window.addEventListener('mousemove', function(e){ if(!dragging) return; tx=e.clientX-sx; ty=e.clientY-sy; applyTransform(); });
window.addEventListener('mouseup', function(){ dragging=false; viewer.classList.remove('grabbing'); });
viewer.addEventListener('dblclick', fitImage);
window.addEventListener('resize', fitImage);
let autoInterval = null;
const btnPlay = document.getElementById('btn-play');
const speedSelect = document.getElementById('speed-select');
function autoNext() {
  const g = GROUPS[curGroup];
  if (curSlide < g.images.length-1) loadSlide(curGroup, curSlide+1);
  else if (curGroup < GROUPS.length-1) { buildThumbsFor(curGroup+1); loadSlide(curGroup+1, 0); }
  else { buildThumbsFor(0); loadSlide(0, 0); }
}
function stopAuto() { clearInterval(autoInterval); autoInterval=null; btnPlay.innerHTML='&#9654; 自動播放'; btnPlay.classList.remove('playing'); }
btnPlay.onclick = function() {
  if (autoInterval) stopAuto();
  else { autoInterval=setInterval(autoNext, parseInt(speedSelect.value)); btnPlay.innerHTML='&#9208; 暫停'; btnPlay.classList.add('playing'); }
};
speedSelect.addEventListener('change', function(){ if(autoInterval){ clearInterval(autoInterval); autoInterval=setInterval(autoNext, parseInt(speedSelect.value)); } });
buildSidebar();
buildThumbsFor(0);
loadSlide(0, 0);
</script>
